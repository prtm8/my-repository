<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Product Profile</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            margin: 15px 0 5px;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        .link-btn {
            display: block;
            background: #111;
            color: white;
            text-decoration: none;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            transition: 0.3s;
        }

        .link-btn:hover {
            background: #333;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/120" alt="Profile" class="profile-img">

    <h1>Raden Store</h1>
    <p>Produk pilihan terbaik ✨<br>Simple • Murah • Berkualitas</p>

    <a href="#" class="link-btn">🛒 Shopee Product</a>
    <a href="#" class="link-btn">🔥 TikTok Shop</a>
    <a href="#" class="link-btn">📷 Instagram</a>
    <a href="#" class="link-btn">💬 WhatsApp Order</a>

    <div class="footer">
        Made with ❤️ by Raden
    </div>
</div>

</body>
</html>
